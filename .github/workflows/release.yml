name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify release on PHP 8.3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: curl, json, mbstring

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint
        run: composer run lint

      - name: Run unit tests
        run: composer test

      - name: Build release archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p dist
          composer archive --format=zip --dir=dist --file=leapocr-php-${VERSION}
          ls -lh dist/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php-release-archive
          path: dist/*.zip
          retention-days: 7

  publish:
    name: Create GitHub release
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: php-release-archive
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.zip

  notify-packagist:
    name: Notify Packagist
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Packagist update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_TOKEN" ]; then
            echo "Packagist credentials are not configured; skipping notification."
            exit 0
          fi

          curl --fail-with-body --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/leapocr/leapocr-php"}}'
